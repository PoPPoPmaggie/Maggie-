<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Maggie</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:system-ui,sans-serif;background:#0a0a0f;min-height:100vh;display:flex;flex-direction:column}
#header{background:linear-gradient(135deg,#1a0533,#0d0d1a);border-bottom:1px solid #2d1b4e;padding:14px 18px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:10}
#avatar{width:46px;height:46px;border-radius:50%;background:linear-gradient(135deg,#9333ea,#ec4899);display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:bold;color:white;position:relative;flex-shrink:0}
#htext{flex:1}
#hname{color:white;font-weight:700;font-size:17px}
#hstatus{font-size:11px;color:#a78bfa}
#messages{flex:1;overflow-y:auto;padding:18px;display:flex;flex-direction:column;gap:14px}
.mrow{display:flex;gap:10px;align-items:flex-start}
.mrow.user{justify-content:flex-end}
.mavatar{width:30px;height:30px;border-radius:50%;flex-shrink:0;background:linear-gradient(135deg,#9333ea,#ec4899);display:flex;align-items:center;justify-content:center;color:white;font-size:12px;font-weight:bold}
.mbubble{max-width:80%;padding:12px 16px;font-size:14px;line-height:1.7;color:#e2e8f0}
.mbubble.user{background:linear-gradient(135deg,#7c3aed,#6d28d9);border-radius:18px 18px 4px 18px}
.mbubble.bot{background:rgba(255,255,255,0.04);border:1px solid rgba(147,51,234,0.2);border-radius:4px 18px 18px 18px}
#ibar{padding:12px 18px;border-top:1px solid rgba(147,51,234,0.2);background:rgba(10,10,15,0.97);display:flex;gap:10px}
#uinput{flex:1;background:rgba(255,255,255,0.05);border:1px solid rgba(147,51,234,0.3);border-radius:12px;padding:12px 15px;color:white;font-size:14px;outline:none}
#uinput::placeholder{color:#4b5563}
#sbtn{background:linear-gradient(135deg,#7c3aed,#db2777);border:none;border-radius:12px;padding:12px 20px;color:white;font-weight:700;font-size:13px;cursor:pointer}
</style>
</head>
<body>
<div id="header">
  <div id="avatar">M</div>
  <div id="htext">
    <div id="hname">MAGGIE</div>
    <div id="hstatus" id="hstatus">● ONLINE — LET'S GET THIS MONEY</div>
  </div>
</div>
<div id="messages"></div>
<div id="ibar">
  <input id="uinput" type="text" placeholder="Talk to Maggie..." onkeydown="if(event.key==='Enter')send()"/>
  <button id="sbtn" onclick="send()">SEND</button>
</div>
<script>
const EK="sk_519aacb7edad9352ca48f1350b9aef86fe96b958e5fa9f37";
const VID="EXAVITQu4vr4xnSDxMaL";
let msgs=[];
let aud=null;

async function speak(text){
  if(aud){aud.pause();aud=null;}
  const clean=text.replace(/[*#]/g,'').replace(/\n+/g,' ').trim();
  try{
    const r=await fetch('https://api.elevenlabs.io/v1/text-to-speech/'+VID,{
      method:'POST',
      headers:{'xi-api-key':EK,'Content-Type':'application/json'},
      body:JSON.stringify({text:clean,model_id:'eleven_turbo_v2',voice_settings:{stability:0.4,similarity_boost:0.85,style:0.6,use_speaker_boost:true}})
    });
    if(!r.ok)return;
    const url=URL.createObjectURL(await r.blob());
    aud=new Audio(url);
    aud.play();
  }catch(e){}
}

function addMsg(role,content){
  msgs.push({role,content});
  const row=document.createElement('div');
  row.className='mrow '+(role==='assistant'?'bot':role);
  row.innerHTML=role==='assistant'
    ?'<div class="mavatar">M</div><div class="mbubble bot">'+content+'</div>'
    :'<div class="mbubble user">'+content+'</div>';
  document.getElementById('messages').appendChild(row);
  row.scrollIntoView({behavior:'smooth'});
}

async function send(){
  const inp=document.getElementById('uinput');
  const msg=inp.value.trim();
  if(!msg)return;
  inp.value='';
  addMsg('user',msg);
  document.getElementById('hstatus').textContent='● THINKING...';
  try{
    const r=await fetch('https://maggie-jis0.onrender.com/chat?t='+Date.now(),{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({messages:msgs.slice(-10)})
    });
    const d=await r.json();
    const reply=d.content?.map(b=>b.text||'').join(' ')||'Try again.';
    addMsg('assistant',reply);
    speak(reply);
    document.getElementById('hstatus').textContent="● ONLINE — LET'S GET THIS MONEY";
  }catch(e){
    addMsg('assistant','Connection error: '+e.message);
    document.getElementById('hstatus').textContent='● ERROR';
  }
}

// Auto start
window.onload=()=>send_auto();
async function send_auto(){
  msgs=[];
  addMsg('user',"Hey Maggie, I'm Eric. Starting from zero. Introduce yourself.");
  document.getElementById('hstatus').textContent='● THINKING...';
  try{
    const r=await fetch('https://maggie-jis0.onrender.com/chat?t='+Date.now(),{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({messages:msgs.slice(-10)})
    });
    const d=await r.json();
    const reply=d.content?.map(b=>b.text||'').join(' ')||'Try again.';
    addMsg('assistant',reply);
    speak(reply);
    document.getElementById('hstatus').textContent="● ONLINE — LET'S GET THIS MONEY";
  }catch(e){
    addMsg('assistant','Error: '+e.message+'. The server may be waking up, try refreshing in 30 seconds.');
    document.getElementById('hstatus').textContent='● WAKING UP...';
  }
}
</script>
</body>
</html>
